name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cached dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-
            ${{ runner.os }}-cargo-

      - name: cargo check (workspace)
        run: cargo check --workspace

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore cached dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
            ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cached dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Run unit tests
        run: cargo test --workspace --lib

  build-perf-bench:
    name: Build perf-bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cached dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-
            ${{ runner.os }}-cargo-

      - name: Build perf-bench binary
        run: cargo build -p perf-bench --release

      - name: Build Criterion benches
        run: cargo bench -p perf-bench --no-run

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: perf-bench-linux-x86_64
          path: target/release/perf-bench
          retention-days: 7

  accuracy-tests:
    name: Accuracy regression
    runs-on: ubuntu-latest
    needs: [check, unit-tests]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cached test model
        id: cache-model
        uses: actions/cache@v6
        with:
          path: /tmp/models/LFM2-700M-Q4_0.gguf
          key: test-model-${{ hashFiles('scripts/download-test-model.sh') }}

      - name: Download test model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/models
          scripts/download-test-model.sh
          cp models/LFM2-700M-Q4_0.gguf $ATHEER_TEST_MODEL

      - name: Symlink model for cached runs
        if: steps.cache-model.outputs.cache-hit == 'true'
        run: |
          mkdir -p models
          ln -sf $ATHEER_TEST_MODEL models/LFM2-700M-Q4_0.gguf

      - name: Run accuracy integration tests
        run: cargo test -p atheer-core -- --ignored accuracy
        env:
          ATHEER_TEST_MODEL: /tmp/models/LFM2-700M-Q4_0.gguf
